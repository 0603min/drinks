<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我愛喝飲料 - 2026 穩定修復版</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧋</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD859fl8yhO4iBDQYhBCcJlvKNakRprlDI",
            authDomain: "drinks-e4cab.firebaseapp.com",
            projectId: "drinks-e4cab",
            storageBucket: "drinks-e4cab.firebasestorage.app",
            messagingSenderId: "131339160240",
            appId: "1:131339160240:web:25431ca8429984f5cec975"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'drinks-e4cab-project';

        // 處理 Room ID
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        if (!roomId) {
            roomId = localStorage.getItem('magic_room_id') || Math.random().toString(36).substring(2, 8).toUpperCase();
            localStorage.setItem('magic_room_id', roomId);
            const url = new URL(window.location.href);
            url.searchParams.set('room', roomId);
            window.history.replaceState({}, '', url);
        }

        let currentUser = null;
        let allDrinks = []; 
        let currentViewDate = new Date(); // 預設今天（2月）
        let selectedDate = null;
        let editingDrinkIndex = null; 
        let unsubscribe = null;

        const ICE_LEVELS = ["正常", "少冰", "微冰", "去冰", "溫"];
        const SWEETNESS_LEVELS = ["全糖", "少糖", "半糖", "微糖", "一分糖", "無糖", "無法調整"];

        const $ = (id) => document.getElementById(id);

        async function init() {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    $("roomCode").innerText = roomId;
                    setupDataListener();
                }
            });
            renderCalendar();
            setupEventListeners();
            lucide.createIcons();
        }

        function setupDataListener() {
            if (!currentUser) return;
            const roomRef = collection(db, 'artifacts', appId, 'public', 'data', 'room_' + roomId);
            
            unsubscribe = onSnapshot(roomRef, (snapshot) => {
                allDrinks = [];
                snapshot.forEach(dateDoc => {
                    const dateKey = dateDoc.id;
                    const data = dateDoc.data();
                    
                    // 【關鍵相容性邏輯】
                    if (data.list && Array.isArray(data.list)) {
                        // 處理新格式（多筆）
                        data.list.forEach((d, index) => {
                            allDrinks.push({ ...d, dateKey, index });
                        });
                    } else if (data.item) {
                        // 處理舊格式（單一物件），將一月的舊資料撈回來
                        allDrinks.push({ ...data, dateKey, index: 0 });
                    }
                });
                renderCalendar();
                updateStats();
            }, (err) => {
                showToast("讀取失敗，請檢查 Firebase 規則日期！");
            });
        }

        function renderCalendar() {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            $("currentMonthYear").innerText = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = $("calendarGrid");
            grid.innerHTML = "";

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="h-24 sm:h-36 border border-pink-50 bg-pink-50/10"></div>`;

            const today = new Date();
            const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${String(month +
