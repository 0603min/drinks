<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我愛喝手搖 - 2026</title>
    
    <!-- 珍珠奶茶 Favicon 圖示 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧋</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyD859fl8yhO4iBDQYhBCcJlvKNakRprlDI",
            authDomain: "drinks-e4cab.firebaseapp.com",
            projectId: "drinks-e4cab",
            storageBucket: "drinks-e4cab.firebasestorage.app",
            messagingSenderId: "131339160240",
            appId: "1:131339160240:web:25431ca8429984f5cec975"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'drinks-e4cab-project';

        // 處理 Room ID 邏輯
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        if (!roomId) {
            roomId = localStorage.getItem('magic_room_id') || Math.random().toString(36).substring(2, 8).toUpperCase();
            localStorage.setItem('magic_room_id', roomId);
            try {
                const url = new URL(window.location.href);
                url.searchParams.set('room', roomId);
                window.history.replaceState({}, '', url);
            } catch(e) {}
        }

        let currentUser = null;
        let drinksData = {}; 
        let currentViewDate = new Date(); // 初始化為「今天」
        let selectedDate = null;
        let editingIndex = null; 
        let unsubscribe = null;

        const ICE_LEVELS = ["正常", "少冰", "微冰", "去冰", "溫"];
        const SWEETNESS_LEVELS = ["全糖", "少糖", "半糖", "微糖", "一分糖", "無糖", "無法調整"];

        const $ = (id) => document.getElementById(id);

        async function init() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        $("roomCode").innerText = roomId;
                        setupDataListener();
                    }
                });
                renderCalendar();
                setupEventListeners();
                lucide.createIcons();
                createSakura();
            } catch (err) {
                console.error("Init Error:", err);
            }
        }

        function setupDataListener() {
            if (!currentUser) return;
            const roomRef = collection(db, 'artifacts', appId, 'public', 'data', 'room_' + roomId);
            unsubscribe = onSnapshot(roomRef, (snapshot) => {
                drinksData = {};
                snapshot.forEach(doc => {
                    const data = doc.data();
                    // 核心修正：如果資料是舊格式(單一物件)，自動轉換為數組格式
                    if (data.item && !data.list) {
                        drinksData[doc.id] = { list: [data] };
                    } else {
                        drinksData[doc.id] = data;
                    }
                });
                renderCalendar();
                updateStats();
            });
        }

        function renderCalendar() {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            $("currentMonthYear").innerText = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = $("calendarGrid");
            grid.innerHTML = "";

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="h-20 sm:h-32 border border-pink-50 bg-pink-50/10"></div>`;

            const todayStr = new Date().toLocaleDateString('en-CA'); 

            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayData = drinksData[dateKey];
                const isToday = todayStr === dateKey;
                
                const dayEl = document.createElement("div");
                dayEl.className = `h-20 sm:h-32 border border-pink-100 relative cursor-pointer hover:bg-rose-50 transition-all p-1 overflow-y-auto ${isToday ? 'bg-rose-50 ring-2 ring-pink-400 ring-inset' : 'bg-white'}`;
                dayEl.onclick = () => openMainModal(dateKey);
                
                let drinksHtml = '';
                if (dayData && dayData.list) {
                    dayData.list.forEach(drink => {
                        drinksHtml += `
                            <div class="bg-gradient-to-r from-rose-400 to-pink-400 text-white text-[7px] sm:text-[9px] p-0.5 mb-0.5 rounded shadow-sm leading-tight break-all">
                                ${drink.item}-${drink.shop} $${drink.price || 0}
                            </div>
                        `;
                    });
                }

                dayEl.innerHTML = `
                    <span class="text-xs sm:text-sm font-bold ${isToday ? 'text-rose-600' : 'text-pink-400'}">${day}</span>
                    <div class="mt-0.5 flex flex-col gap-0.5">
                        ${drinksHtml}
                    </div>
                `;
                grid.appendChild(dayEl);
            }
        }

        function openMainModal(dateKey) {
            selectedDate = dateKey;
            $("modalDateTitle").innerText = `${dateKey} 的紀錄清單`;
            renderDrinkList();
            $("drinkListModal").classList.remove("hidden");
            $("drinkListModal").classList.add("flex");
        }

        function renderDrinkList() {
            const container = $("drinkListContainer");
            container.innerHTML = "";
            const list = (drinksData[selectedDate] && drinksData[selectedDate].list) || [];
            
            if (list.length === 0) {
                container.innerHTML = `<p class="text-center text-rose-300 py-4 text-sm">今日無紀錄 🧋</p>`;
            } else {
                list.forEach((drink, index) => {
                    const item = document.createElement("div");
                    item.className = "bg-rose-50/50 p-3 rounded-2xl border border-pink-100 flex justify-between items-center";
                    item.innerHTML = `
                        <div class="flex-1">
                            <p class="text-sm font-bold text-rose-700">${drink.item} <span class="text-xs font-normal text-rose-400">@ ${drink.shop}</span></p>
                            <p class="text-[10px] text-rose-400">${drink.ice} / ${drink.sweetness} / $${drink.price}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="event.stopPropagation(); window.editDrink(${index})" class="p-2 bg-white rounded-full text-rose-400"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="event.stopPropagation(); window.confirmDelete(${index})" class="p-2 bg-white rounded-full text-rose-200"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    `;
                    container.appendChild(item);
                });
            }
            lucide.createIcons();
        }

        window.openFormModal = function(index = null) {
            editingIndex = index;
            const list = (drinksData[selectedDate] && drinksData[selectedDate].list) || [];
            const data = index !== null ? list[index] : { shop: '', item: '', price: '', ice: '正常', sweetness: '全糖', note: '' };
            
            $("formModalTitle").innerText = index !== null ? "修改紀錄" : "新增魔法紀錄";
            $("inputShop").value = data.shop;
            $("inputItem").value = data.item;
            $("inputPrice").value = data.price || '';
            $("inputNote").value = data.note || '';
            
            renderOptionButtons("iceContainer", ICE_LEVELS, data.ice);
            renderOptionButtons("sweetnessContainer", SWEETNESS_LEVELS, data.sweetness);
            
            $("drinkFormModal").classList.remove("hidden");
            $("drinkFormModal").classList.add("flex");
        };

        window.editDrink = (index) => openFormModal(index);

        function renderOptionButtons(containerId, options, selectedValue) {
            const container = $(containerId);
            container.innerHTML = "";
            options.forEach(opt => {
                const isSelected = selectedValue === opt;
                const btn = document.createElement("button");
                btn.innerText = opt;
                btn.className = `px-2 py-3 rounded-xl text-[10px] sm:text-sm font-medium border transition-all ${isSelected ? 'bg-rose-500 text-white border-rose-500 shadow-md scale-105' : 'bg-white text-rose-400 border-pink-200'}`;
                btn.onclick = () => {
                    container.querySelectorAll('button').forEach(b => b.className = `px-2 py-3 rounded-xl text-[10px] sm:text-sm font-medium border bg-white text-rose-400 border-pink-200`);
                    btn.className = `px-2 py-3 rounded-xl text-[10px] sm:text-sm font-medium border bg-rose-500 text-white border-rose-500 shadow-md scale-105`;
                };
                container.appendChild(btn);
            });
        }

        async function saveDrink() {
            if (!currentUser || !selectedDate) return;
            const shop = $("inputShop").value.trim();
            const item = $("inputItem").value.trim();
            const price = $("inputPrice").value;
            if (!shop || !item) { showToast("請填寫店名與品項！"); return; }
            
            const ice = Array.from($("iceContainer").querySelectorAll('button')).find(b => b.classList.contains('bg-rose-500'))?.innerText;
            const sweetness = Array.from($("sweetnessContainer").querySelectorAll('button')).find(b => b.classList.contains('bg-rose-500'))?.innerText;
            
            const newEntry = { shop, item, price: price ? parseInt(price) : 0, ice, sweetness, note: $("inputNote").value, updatedAt: new Date().toISOString() };
            
            let currentList = (drinksData[selectedDate] && drinksData[selectedDate].list) || [];
            if (editingIndex !== null) {
                currentList[editingIndex] = newEntry;
            } else {
                currentList.push(newEntry);
            }
            
            try {
                const drinkRef = doc(db, 'artifacts', appId, 'public', 'data', 'room_' + roomId, selectedDate);
                await setDoc(drinkRef, { list: currentList });
                closeFormModal();
                renderDrinkList();
                showToast("🪄 已儲存！");
            } catch (e) {
                showToast("同步失敗。");
            }
        }

        window.confirmDelete = async (index) => {
            let currentList = (drinksData[selectedDate] && drinksData[selectedDate].list) || [];
            currentList.splice(index, 1);
            try {
                const drinkRef = doc(db, 'artifacts', appId, 'public', 'data', 'room_' + roomId, selectedDate);
                if (currentList.length === 0) {
                    await deleteDoc(drinkRef);
                } else {
                    await setDoc(drinkRef, { list: currentList });
                }
                renderDrinkList();
                showToast("✨ 已抹除");
            } catch (e) {
                showToast("刪除失敗。");
            }
        };

        function closeListModal() { $("drinkListModal").classList.add("hidden"); }
        function closeFormModal() { $("drinkFormModal").classList.add("hidden"); }
        
        function setupEventListeners() {
            $("prevMonth").onclick = () => { currentViewDate.setMonth(currentViewDate.getMonth() - 1); renderCalendar(); };
            $("nextMonth").onclick = () => { currentViewDate.setMonth(currentViewDate.getMonth() + 1); renderCalendar(); };
            $("saveBtn").onclick = saveDrink;
            $("closeListModal").onclick = closeListModal;
            $("closeFormModal").onclick = closeFormModal;
            $("addDrinkBtn").onclick = () => openFormModal();
            
            $("copyLinkBtn").onclick = () => {
                const url = new URL(window.location.href);
                url.searchParams.set('room', roomId);
                const temp = document.createElement("input");
                document.body.appendChild(temp);
                temp.value = url.toString();
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
                showToast("📋 連結已複製！");
            };
        }

        function updateStats() {
            let totalDrinks = 0;
            let totalSpent = 0;
            const shops = {};
            Object.values(drinksData).forEach(day => {
                if (day.list) {
                    day.list.forEach(d => {
                        totalDrinks++;
                        totalSpent += (d.price || 0);
                        shops[d.shop] = (shops[d.shop] || 0) + 1;
                    });
                }
            });
            $("statTotal").innerText = totalDrinks;
            $("statTotalSpent").innerText = `$${totalSpent}`;
            const fav = Object.entries(shops).sort((a,b) => b[1] - a[1])[0];
            $("statFavShop").innerText = fav ? fav[0] : "無";
        }

        function showToast(msg) {
            const t = $("toast");
            t.innerText = msg;
            t.classList.remove("translate-y-20", "opacity-0");
            setTimeout(() => t.classList.add("translate-y-20", "opacity-0"), 3000);
        }

        function createSakura() {
            for (let i = 0; i < 6; i++) {
                const s = document.createElement('div');
                s.className = 'sakura';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(s);
            }
        }

        window.onload = init;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff5f7; overflow-x: hidden; }
        .calendar-header-day { text-align: center; padding: 0.75rem 0; font-size: 10px; font-weight: 700; color: #fda4af; text-transform: uppercase; background: rgba(255,241,242,0.5); }
        .sakura { position: fixed; top: -20px; width: 15px; height: 15px; background: #ffb7c5; border-radius: 100% 0 100% 0; opacity: 0.3; z-index: 1; pointer-events: none; animation: fall 12s linear infinite; }
        @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 0.6; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen text-gray-800 pb-24">
    <header class="bg-white/80 backdrop-blur-md border-b border-pink-100 sticky top-0 z-30 shadow-md">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-gradient-to-br from-rose-400 to-pink-500 p-1.5 rounded-full text-white shadow-md"><i data-lucide="sparkles" class="w-4 h-4"></i></div>
                <h1 class="text-lg font-black bg-gradient-to-r from-rose-600 to-pink-500 bg-clip-text text-transparent">我愛喝手搖</h1>
            </div>
            <div class="flex items-center gap-1 bg-pink-50 p-1 rounded-full border border-pink-100">
                <button id="prevMonth" class="p-2 text-rose-400"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                <span id="currentMonthYear" class="px-2 font-bold text-rose-700 min-w-[90px] text-center text-sm"></span>
                <button id="nextMonth" class="p-2 text-rose-400"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 mt-6 relative z-10">
        <div class="grid grid-cols-3 gap-2 mb-6 text-center">
            <div class="bg-white p-3 rounded-3xl border-2 border-pink-50 shadow-sm">
                <p class="text-[8px] text-rose-300 font-bold uppercase">總杯數</p><p id="statTotal" class="text-xl font-black text-rose-600">0</p>
            </div>
            <div class="bg-white p-3 rounded-3xl border-2 border-pink-50 shadow-sm">
                <p class="text-[8px] text-amber-400 font-bold uppercase">總支出</p><p id="statTotalSpent" class="text-xl font-black text-rose-600">$0</p>
            </div>
            <div class="bg-white p-3 rounded-3xl border-2 border-pink-50 shadow-sm">
                <p class="text-[8px] text-pink-400 font-bold uppercase">最常喝</p><p id="statFavShop" class="text-xs font-black text-rose-600 truncate px-1">無</p>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] border-2 border-pink-50 shadow-2xl overflow-hidden">
            <div class="grid grid-cols-7 border-b border-pink-50">
                <div class="calendar-header-day">日</div><div class="calendar-header-day">一</div><div class="calendar-header-day">二</div><div class="calendar-header-day">三</div><div class="calendar-header-day">四</div><div class="calendar-header-day">五</div><div class="calendar-header-day" style="color: #fbbf24;">六</div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7"></div>
        </div>

        <div class="mt-8 p-6 bg-white/70 rounded-[2rem] border-2 border-dashed border-rose-200 text-center">
            <button id="copyLinkBtn" class="bg-rose-500 text-white px-6 py-2 rounded-full font-bold text-sm shadow-lg hover:scale-105 transition-all">複製同步連結</button>
            <p class="mt-2 text-[10px] text-rose-300">房間號：<span id="roomCode" class="font-mono">---</span></p>
        </div>
    </main>

    <!-- 清單 Modal -->
    <div id="drinkListModal" class="fixed inset-0 bg-rose-900/20 backdrop-blur-md z-40 hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
            <div class="px-6 py-5 border-b border-pink-50 flex justify-between items-center bg-rose-50/30">
                <div class="flex items-center gap-2 text-rose-800 font-black"><i data-lucide="list" class="w-5 h-5"></i><h3 id="modalDateTitle">紀錄</h3></div>
                <button id="closeListModal"><i data-lucide="x" class="text-rose-300 w-6 h-6"></i></button>
            </div>
            <div id="drinkListContainer" class="p-6 space-y-3 overflow-y-auto flex-1 no-scrollbar"></div>
            <div class="p-6 bg-rose-50/30">
                <button id="addDrinkBtn" class="w-full py-4 bg-gradient-to-r from-rose-500 to-pink-500 text-white font-black rounded-2xl shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="plus" class="w-5 h-5"></i> 增加新紀錄
                </button>
            </div>
        </div>
    </div>

    <!-- 表單 Modal -->
    <div id="drinkFormModal" class="fixed inset-0 bg-rose-950/40 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl p-6 space-y-4 animate-in fade-in zoom-in duration-200">
            <div class="flex justify-between items-center">
                <h3 id="formModalTitle" class="font-black text-rose-800">魔法紀錄</h3>
                <button id="closeFormModal"><i data-lucide="x" class="text-rose-300 w-6 h-6"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input id="inputShop" type="text" placeholder="店名" class="w-full px-4 py-3 rounded-2xl border-2 border-pink-50 focus:outline-none text-sm">
                <input id="inputItem" type="text" placeholder="品項" class="w-full px-4 py-3 rounded-2xl border-2 border-pink-50 focus:outline-none text-sm">
            </div>
            <input id="inputPrice" type="number" placeholder="金額 NT$" class="w-full px-4 py-3 rounded-2xl border-2 border-pink-50 focus:outline-none text-sm">
            <div><p class="text-[10px] font-black text-rose-300 text-center mb-2">冰量</p><div id="iceContainer" class="grid grid-cols-3 gap-2"></div></div>
            <div><p class="text-[10px] font-black text-rose-300 text-center mb-2">甜度</p><div id="sweetnessContainer" class="grid grid-cols-4 gap-2"></div></div>
            <textarea id="inputNote" placeholder="備註..." class="w-full px-4 py-3 rounded-2xl border-2 border-pink-50 focus:outline-none text-sm resize-none" rows="2"></textarea>
            <button id="saveBtn" class="w-full py-4 bg-rose-500 text-white font-black rounded-2xl shadow-lg">封印紀錄！</button>
        </div>
    </div>
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-rose-800 text-white px-6 py-2 rounded-full shadow-2xl transition-all duration-500 transform translate-y-20 opacity-0 z-[100] text-sm font-bold"></div>
</body>
</html>
